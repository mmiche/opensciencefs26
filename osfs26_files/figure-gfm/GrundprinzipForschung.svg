    <text
       xml:space="preserve"
       style="font-size:4.9389px;line-height:1.25;font-family:sans-serif;stroke-width:0.264583"
       x="17.844639"
       y="105.6906"
       id="text20288"><tspan
         sodipodi:role="line"
         id="tspan20286"
         style="stroke-width:0.264583"
         x="17.844639"
         y="105.6906">S = Schwierigkeit bzw. generell Phänomen, z.B. psych. Störung x.</tspan><tspan
         sodipodi:role="line"
         style="stroke-width:0.264583"
         x="17.844639"
         y="111.86422"
         id="tspan20290">W = Warum (Risikofaktor, RF) bzw. Warum nicht (Protektivfaktor, PF)</tspan><tspan
         sodipodi:role="line"
         style="stroke-width:0.264583"
         x="17.844639"
         y="118.03785"
         id="tspan20292">D = Darum (kausaler RF) bzw. Darum nicht (kausaler PF)</tspan><tspan
         sodipodi:role="line"
         style="stroke-width:0.264583"
         x="17.844639"
         y="124.21147"
         id="tspan22220">¬D = Eliminiere das &quot;Darum&quot; (= den Grund) für S, falls möglich.</tspan><tspan
         sodipodi:role="line"
         style="stroke-width:0.264583"
         x="17.844639"
         y="130.3851"
         id="tspan22222">Falls nicht möglich, dann wenigstens Gegenmassnahmen einleiten.</tspan><tspan
         sodipodi:role="line"
         style="stroke-width:0.264583"
         x="17.844639"
         y="136.55872"
         id="tspan22224" /><tspan
         sodipodi:role="line"
         style="stroke-width:0.264583"
         x="17.844639"
         y="142.73235"
         id="tspan22226">Gestrichelter gebogener Pfeil = Wenn nicht eliminiert und keine</tspan><tspan
         sodipodi:role="line"
         style="stroke-width:0.264583"
         x="17.844639"
         y="148.90598"
         id="tspan22228">Gegenmassnahme, dann bleibt S bestehen.</tspan><tspan
         sodipodi:role="line"
         style="stroke-width:0.264583"
         x="17.844639"
         y="155.07959"
         id="tspan22230" /><tspan
         sodipodi:role="line"
         style="stroke-width:0.264583"
         x="17.844639"
         y="161.25322"
         id="tspan22232">Gestrichelter Pfeil zu GS = Wenn Gegenmassnahme, dann unter</tspan><tspan
         sodipodi:role="line"
         style="stroke-width:0.264583"
         x="17.844639"
         y="167.42685"
         id="tspan22234">Umständen Geringere Schwierigkeit (GS).</tspan><tspan
         sodipodi:role="line"
         style="stroke-width:0.264583"
         x="17.844639"
         y="173.60048"
         id="tspan22236" /><tspan
         sodipodi:role="line"
         style="stroke-width:0.264583"
         x="17.844639"
         y="179.77409"
         id="tspan22238">Gestrichelter Pfeil zu KS = Wenn Eliminierung, dann unter Umständen</tspan><tspan
         sodipodi:role="line"
         style="stroke-width:0.264583"
         x="17.844639"
         y="185.94772"
         id="tspan22240">Keine Schwierigkeit (KS).</tspan></text>
